    name: progress-narrative-agent
    env: docker
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: ALERT_EMAIL_FAISAL
        value: faisal@tangier.us
      - key: ALERT_EMAIL_AFTAB
        value: community@evqlabs.com
      - key: FROM_EMAIL
        value: agent@tangier.us
      - key: AAEP_WINDOW_END
        value: "2026-06-30"
